<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLost @Chandrakasem - Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: #fff0f5;
            color: #5c4b51;
            margin: 0;
            padding: 40px 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ---------------- ก้อนสีพื้นหลัง (Glowing Blobs) ---------------- */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.7;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: #ffb3c6;
            top: -100px; left: -100px;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: #b5ead7;
            bottom: -150px; right: -150px;
            animation-delay: -5s;
        }
        .blob-3 {
            width: 300px; height: 300px;
            background: #ffd1dc;
            top: 40%; left: 60%;
            animation-duration: 15s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* ---------------- คอนเทนเนอร์หลัก (Glassmorphism) ---------------- */
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(255, 175, 188, 0.15),
                        inset 0 0 0 2px rgba(255, 255, 255, 0.8);
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
            letter-spacing: -1.5px;
            filter: drop-shadow(0 4px 8px rgba(255,117,140,0.2));
        }

        header p {
            color: #887a7d;
            font-size: 16px;
            margin: 0;
            font-weight: 400;
        }

        /* ---------------- ปุ่มเปิดฟอร์ม (Premium Button) ---------------- */
        .btn-add-item {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            background-size: 200% auto;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 50px;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(255, 154, 158, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .btn-add-item:hover {
            background-position: right center;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(255, 154, 158, 0.5);
        }

        /* ---------------- Modal (Pop-up) ---------------- */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 240, 245, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 35px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 30px 60px rgba(255, 154, 158, 0.25),
                        inset 0 0 0 2px rgba(255, 255, 255, 0.9);
            position: relative;
            transform: scale(0.9) translateY(30px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.show .modal-content {
            transform: scale(1) translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: #fff;
            color: #ff758c;
            border: 2px solid #ffe1e8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(255, 117, 140, 0.1);
        }

        .close-btn:hover {
            background: #ff758c;
            color: #fff;
            transform: rotate(90deg);
        }

        .modal-title {
            text-align: center;
            color: #ff758c;
            font-size: 26px;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 700;
        }

        /* ---------------- ฟอร์มอินพุต ---------------- */
        .form-group { margin-bottom: 22px; }

        input, select, textarea {
            width: 100%;
            padding: 18px 25px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(255, 225, 232, 0.5);
            border-radius: 20px;
            font-size: 16px;
            color: #5c4b51;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }

        input:focus, select:focus, textarea:focus {
            border-color: #ff9a9e;
            background-color: #fff;
            box-shadow: 0 0 0 5px rgba(255, 154, 158, 0.15), inset 0 2px 5px rgba(0,0,0,0.01);
            transform: translateY(-2px);
        }

        input[type="file"] { display: none; }

        .file-upload-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 20px;
            border: 2px dashed #ffb3c6;
        }

        .custom-file-upload {
            padding: 12px 25px;
            background: #fff;
            color: #ff758c;
            border-radius: 15px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(255, 117, 140, 0.1);
        }

        .custom-file-upload:hover {
            background: #ff758c;
            color: #fff;
            box-shadow: 0 6px 15px rgba(255, 117, 140, 0.2);
        }

        .file-name { font-size: 14px; color: #a89f9e; }

        /* ---------------- กล่องยินยอมข้อมูล (Consent) ---------------- */
        .consent-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 25px;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            border: 1px solid #ffe1e8;
        }

        .consent-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            min-width: 18px;
            margin-top: 2px;
            accent-color: #ff758c;
            cursor: pointer;
            box-shadow: none;
        }

        .consent-group label {
            font-size: 13px;
            color: #7a6e71;
            line-height: 1.5;
            cursor: pointer;
        }

        .consent-group label strong {
            color: #ff758c;
        }

        button[type="submit"] {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.3);
        }

        button[type="submit"]:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255, 117, 140, 0.4); }

        /* ---------------- รายการ (Item Cards) ---------------- */
        .section-title {
            font-size: 24px;
            font-weight: 700;
            color: #ff758c;
            margin: 0 0 30px 0;
            text-align: center;
        }

        .item-list { display: grid; gap: 30px; }

        .item-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(255, 175, 188, 0.15),
                        inset 0 0 0 2px rgba(255, 255, 255, 0.8);
            transition: all 0.4s ease;
            opacity: 0; /* ซ่อนไว้รอแอนิเมชัน */
            transform: translateY(30px);
            animation: fadeInUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .item-card:hover {
            transform: translateY(-8px) scale(1.01);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 25px 50px rgba(255, 175, 188, 0.25),
                        inset 0 0 0 2px #fff;
        }

        .item-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 25px;
            background-color: #f9f9f9;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .badge.lost { background: #ffe4e1; color: #ff6b6b; border: 1px solid #ffd0d0; }
        .badge.found { background: #e0f8e9; color: #2ecc71; border: 1px solid #c3eed6; }

        .item-card h3 { margin: 0 0 12px 0; font-size: 22px; color: #5c4b51; font-weight: 700; }
        .item-card p { margin: 10px 0; font-size: 16px; color: #7a6e71; line-height: 1.6; }
        .item-card strong { color: #ff758c; font-weight: 600; }

        .contact-box {
            background: linear-gradient(to right, rgba(255, 240, 245, 0.8), rgba(255, 255, 255, 0.8));
            padding: 15px 20px;
            border-radius: 18px;
            display: inline-block;
            margin-top: 15px;
            color: #ff758c;
            font-weight: 600;
            border-left: 4px solid #ff9a9e;
        }

        .timestamp {
            font-size: 13px !important;
            color: #bfaeb2 !important;
            margin-top: 25px !important;
            text-align: right;
            display: block;
        }

        .loading-text { 
            text-align: center; color: #ff9a9e; font-size: 18px; padding: 40px; font-weight: 500;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* ---------------- Toast Notification ---------------- */
        .toast {
            position: fixed; bottom: 40px; right: 40px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            color: #5c4b51;
            padding: 18px 30px; border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255, 117, 140, 0.2);
            display: flex; align-items: center; gap: 15px;
            transform: translateY(120px); opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 2000;
            font-weight: 600; font-size: 16px;
            border: 2px solid #fff;
        }

        .toast.show { transform: translateY(0); opacity: 1; }
        .toastIcon { font-size: 24px; }

        @media (max-width: 600px) {
            .container { padding: 30px 20px; border-radius: 30px; }
            h1 { font-size: 36px; }
            .modal-content { padding: 30px 20px; }
            .toast { bottom: 20px; right: 20px; left: 20px; justify-content: center; }
        }
    </style>
</head>
<body>
    <!-- สีพื้นหลังลอยๆ -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="container">
        <header>
            <h1>UniLost</h1>
            <p>ระบบแจ้งของหาย / พบของ ภายในมหาวิทยาลัยจันทรเกษม</p>
        </header>

        <button class="btn-add-item" id="openModalBtn">
            ✨ แจ้งของหาย / พบของ ✨
        </button>

        <section class="list-section">
            <h2 class="section-title">รายการล่าสุด 📋</h2>
            <div id="itemList" class="item-list">
                <p class="loading-text">กำลังโหลดข้อมูลน่ารักๆ... 🌸</p>
            </div>
        </section>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="formModal">
        <div class="modal-content">
            <button class="close-btn" id="closeModalBtn">✖</button>
            <h2 class="modal-title">📝 แจ้งรายการใหม่</h2>
            
            <form id="itemForm">
                <div class="form-group">
                    <select id="type" required>
                        <option value="" disabled selected>✨ เลือกประเภทการแจ้ง...</option>
                        <option value="lost">🚨 ของหาย (Lost)</option>
                        <option value="found">✅ พบของ (Found)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <input type="text" id="itemName" placeholder="🧸 ชื่อสิ่งของ (เช่น กุญแจรถ, บัตรนักศึกษา)" required>
                </div>

                <div class="form-group">
                    <textarea id="description" placeholder="📝 รายละเอียดเพิ่มเติม (สี, ยี่ห้อ, จุดที่พบ/หาย)" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <input type="text" id="contact" placeholder="💬 ข้อมูลติดต่อกลับ (Line ID, เบอร์โทร)" required>
                </div>

                <div class="form-group consent-group">
                    <input type="checkbox" id="consent" required>
                    <label for="consent">ข้าพเจ้ายินยอมให้ระบบแสดง <strong>ข้อมูลการติดต่อ</strong> ต่อสาธารณะ เพื่อใช้ในการติดตามของหาย/พบของ ภายในมหาวิทยาลัย</label>
                </div>

                <div class="form-group file-upload-group">
                    <label for="imageUpload" class="custom-file-upload">
                        📷 เลือกรูปภาพ
                    </label>
                    <input type="file" id="imageUpload" accept="image/*">
                    <span id="fileName" class="file-name">ยังไม่ได้เลือกไฟล์...</span>
                </div>

                <button type="submit" id="submitBtn">บันทึกข้อมูล 💖</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast">
        <span id="toastIcon" class="toastIcon">✨</span>
        <span id="toastMessage">บันทึกข้อมูลสำเร็จ!</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA87_IkAGM7-85Bckfpu6ZMiIDRESWUGgM",
            authDomain: "unilost-422dc.firebaseapp.com",
            projectId: "unilost-422dc",
            storageBucket: "unilost-422dc.firebasestorage.app",
            messagingSenderId: "582268756311",
            appId: "1:582268756311:web:a32daeaf588e88f20e9e12",
            measurementId: "G-TZFW7VSGNJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const formModal = document.getElementById('formModal');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const itemForm = document.getElementById('itemForm');
        const itemList = document.getElementById('itemList');
        const imageUpload = document.getElementById('imageUpload');
        const fileNameDisplay = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        openModalBtn.addEventListener('click', () => formModal.classList.add('show'));
        closeModalBtn.addEventListener('click', () => formModal.classList.remove('show'));
        formModal.addEventListener('click', (e) => {
            if (e.target === formModal) formModal.classList.remove('show');
        });

        function showToast(message, isError = false) {
            toastMessage.textContent = message;
            document.getElementById('toastIcon').textContent = isError ? '🥺' : '🎉';
            toast.style.borderLeft = isError ? '4px solid #ff6b6b' : '4px solid #2ecc71';
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        imageUpload.addEventListener('change', (e) => {
            fileNameDisplay.textContent = e.target.files.length > 0 ? e.target.files[0].name : "ยังไม่ได้เลือกไฟล์...";
        });

        itemForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerHTML = "กำลังอัปโหลด... ☁️";

            const type = document.getElementById('type').value;
            const itemName = document.getElementById('itemName').value;
            const description = document.getElementById('description').value;
            const contact = document.getElementById('contact').value;
            const file = imageUpload.files[0];

            let imageUrl = "";

            try {
                if (file) {
                    const storageRef = ref(storage, 'unilost_images/' + Date.now() + '_' + file.name);
                    await uploadBytes(storageRef, file);
                    imageUrl = await getDownloadURL(storageRef);
                }

                await addDoc(collection(db, "items"), {
                    type, itemName, description, contact, imageUrl, 
                    timestamp: serverTimestamp()
                });
                
                itemForm.reset();
                fileNameDisplay.textContent = "ยังไม่ได้เลือกไฟล์...";
                formModal.classList.remove('show');
                showToast("บันทึกข้อมูลเรียบร้อยแล้ว!");
            } catch (error) {
                console.error("Error: ", error);
                showToast("เกิดข้อผิดพลาด: " + error.message, true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = "บันทึกข้อมูล 💖";
            }
        });

        const q = query(collection(db, "items"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            itemList.innerHTML = ""; 
            
            if(snapshot.empty) {
                itemList.innerHTML = "<p class='loading-text'>ยังไม่มีรายการแจ้งเข้ามาเลย ✨</p>";
                return;
            }

            snapshot.forEach((doc, index) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = 'item-card';
                // ตั้งค่าดีเลย์แอนิเมชันให้การ์ดค่อยๆ เด้งขึ้นมาทีละใบ
                card.style.animationDelay = `${index * 0.1}s`;
                
                const typeLabel = data.type === 'lost' ? '🚨 ของหาย' : '✅ พบของ';
                const typeClass = data.type === 'lost' ? 'lost' : 'found';
                const timeString = data.timestamp ? data.timestamp.toDate().toLocaleString('th-TH') : 'กำลังบันทึก...';
                const imageHTML = data.imageUrl ? `<img src="${data.imageUrl}" alt="ภาพสิ่งของ">` : '';

                card.innerHTML = `
                    ${imageHTML}
                    <span class="badge ${typeClass}">${typeLabel}</span>
                    <h3>${data.itemName}</h3>
                    <p><strong>รายละเอียด:</strong> ${data.description}</p>
                    <div class="contact-box">💬 ติดต่อ: ${data.contact}</div>
                    <p class="timestamp">🕒 ${timeString}</p>
                `;
                
                itemList.appendChild(card);
            });
        });
    </script>
</body>
</html>
