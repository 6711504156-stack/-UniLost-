<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLost @Chandrakasem - Pastel Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            /* พื้นหลังสีชมพูพาสเทลอ่อนๆ พร้อมลายจุด (Polka dots) สุดน่ารัก */
            background-color: #fff5f8;
            background-image: radial-gradient(#ffd1dc 2px, transparent 2px);
            background-size: 30px 30px;
            color: #5c4b51;
            margin: 0;
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 175, 188, 0.2);
            border: 3px solid #fff;
            position: relative;
        }

        /* ของตกแต่งมินิมอลมุมการ์ด */
        .container::before {
            content: '🌸';
            position: absolute;
            top: -20px;
            left: -15px;
            font-size: 45px;
            transform: rotate(-15deg);
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }

        .container::after {
            content: '✨';
            position: absolute;
            bottom: -15px;
            right: -15px;
            font-size: 40px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 42px;
            font-weight: 600;
            /* ไล่สีพาสเทลชมพู-พีช */
            background: linear-gradient(120deg, #ff9a9e 0%, #fecfef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        header p {
            color: #a89f9e;
            font-size: 15px;
            margin: 0;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        input, select, textarea {
            width: 100%;
            padding: 16px 22px;
            background-color: #fafafa;
            border: 2px solid #ffe1e8;
            border-radius: 18px;
            font-size: 15px;
            color: #5c4b51;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #ffb3c6;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(255, 179, 198, 0.2);
        }

        /* ตกแต่งปุ่มเลือกไฟล์ (File Upload) */
        input[type="file"] {
            display: none;
        }

        .file-upload-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: #fff;
            padding: 12px;
            border-radius: 18px;
            border: 2px dashed #ffb3c6;
        }

        .custom-file-upload {
            padding: 10px 20px;
            background-color: #ffedf1;
            color: #ff6b8b;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .custom-file-upload:hover {
            background-color: #ffb3c6;
            color: #fff;
        }

        .file-name {
            font-size: 13px;
            color: #a89f9e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 18px;
            background: linear-gradient(120deg, #ffb3c6 0%, #ff9a9e 100%);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.3);
        }

        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 154, 158, 0.4);
        }

        button[type="submit"]:disabled {
            background: #f0e6e8;
            color: #c4b9bb;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .section-title {
            font-size: 22px;
            font-weight: 600;
            color: #ff9a9e;
            margin: 50px 0 25px 0;
            text-align: center;
            position: relative;
        }

        .section-title::before, .section-title::after {
            content: '🎀';
            font-size: 18px;
            margin: 0 10px;
        }

        .item-list {
            display: grid;
            gap: 25px;
        }

        .item-card {
            background: #fff;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(255, 209, 220, 0.3);
            transition: all 0.3s ease;
            border: 2px solid #fff9fa;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: #ffe1e8;
            box-shadow: 0 15px 35px rgba(255, 209, 220, 0.4);
        }

        .item-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 20px;
            background-color: #fcfcfc;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        /* สีพาสเทลสำหรับสถานะ */
        .badge.lost { 
            background-color: #ffdac1; 
            color: #d16b32; 
        }

        .badge.found { 
            background-color: #b5ead7; 
            color: #3b8766; 
        }

        .item-card h3 { 
            margin: 0 0 10px 0; 
            font-size: 20px; 
            color: #5c4b51; 
        }

        .item-card p { 
            margin: 8px 0; 
            font-size: 15px; 
            color: #887a7d; 
            line-height: 1.6;
        }

        .item-card strong { 
            color: #ff9a9e; 
            font-weight: 500; 
        }

        .contact-box {
            background-color: #fdf5f8;
            padding: 12px 18px;
            border-radius: 14px;
            display: inline-block;
            margin-top: 10px;
            color: #ff6b8b;
            font-weight: 500;
            border: 1px dashed #ffb3c6;
        }

        .timestamp {
            font-size: 12px !important;
            color: #c4b9bb !important;
            margin-top: 20px !important;
            text-align: right;
            display: block;
        }

        .loading-text { 
            text-align: center; 
            color: #ffb3c6; 
            font-size: 16px;
            padding: 30px;
        }

        /* Toast Notification (แจ้งเตือนแทน Alert แบบเดิม) */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #fff;
            color: #5c4b51;
            padding: 15px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            font-weight: 500;
            border-left: 5px solid #ff9a9e;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            border-left-color: #ffdac1;
            color: #d16b32;
        }

        /* ทำให้รองรับมือถือ */
        @media (max-width: 600px) {
            .container { padding: 30px 20px; border-radius: 20px; }
            h1 { font-size: 32px; }
            .toast { bottom: 20px; right: 20px; left: 20px; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>UniLost</h1>
            <p>ระบบแจ้งของหาย / พบของ ภายในมหาวิทยาลัยจันทรเกษม</p>
        </header>

        <section class="form-section">
            <form id="itemForm">
                <div class="form-group">
                    <select id="type" required>
                        <option value="" disabled selected>✨ เลือกประเภทการแจ้ง...</option>
                        <option value="lost">🚨 ของหาย (Lost)</option>
                        <option value="found">✅ พบของ (Found)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <input type="text" id="itemName" placeholder="🧸 ชื่อสิ่งของ (เช่น กุญแจรถ, บัตรนักศึกษา)" required>
                </div>

                <div class="form-group">
                    <textarea id="description" placeholder="📝 รายละเอียดเพิ่มเติม (สี, ยี่ห้อ, จุดที่พบ/หาย)" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <input type="text" id="contact" placeholder="💬 ข้อมูลติดต่อกลับ (Line ID, เบอร์โทร)" required>
                </div>

                <div class="form-group file-upload-group">
                    <label for="imageUpload" class="custom-file-upload">
                        📷 เลือกรูปภาพ
                    </label>
                    <input type="file" id="imageUpload" accept="image/*">
                    <span id="fileName" class="file-name">ยังไม่ได้เลือกไฟล์...</span>
                </div>

                <button type="submit" id="submitBtn">บันทึกข้อมูล 💖</button>
            </form>
        </section>

        <section class="list-section">
            <h2 class="section-title">รายการล่าสุด</h2>
            <div id="itemList" class="item-list">
                <p class="loading-text">กำลังโหลดข้อมูลน่ารักๆ...</p>
            </div>
        </section>
    </div>

    <!-- กล่องแจ้งเตือน -->
    <div id="toast" class="toast">
        <span id="toastIcon">✨</span>
        <span id="toastMessage">บันทึกข้อมูลสำเร็จ!</span>
    </div>

    <!-- โค้ด JavaScript สำหรับเชื่อมต่อ Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // ตั้งค่า Firebase ตามที่คุณให้มา
        const firebaseConfig = {
            apiKey: "AIzaSyA87_IkAGM7-85Bckfpu6ZMiIDRESWUGgM",
            authDomain: "unilost-422dc.firebaseapp.com",
            projectId: "unilost-422dc",
            storageBucket: "unilost-422dc.firebasestorage.app",
            messagingSenderId: "582268756311",
            appId: "1:582268756311:web:a32daeaf588e88f20e9e12",
            measurementId: "G-TZFW7VSGNJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const itemForm = document.getElementById('itemForm');
        const itemList = document.getElementById('itemList');
        const imageUpload = document.getElementById('imageUpload');
        const fileNameDisplay = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // ฟังก์ชันแสดงการแจ้งเตือนแบบน่ารักๆ
        function showToast(message, isError = false) {
            toastMessage.textContent = message;
            if (isError) {
                toast.classList.add('error');
                document.getElementById('toastIcon').textContent = '🥺';
            } else {
                toast.classList.remove('error');
                document.getElementById('toastIcon').textContent = '🎉';
            }
            
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // อัปเดตชื่อไฟล์เมื่อเลือกรูป
        imageUpload.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameDisplay.textContent = e.target.files[0].name;
            } else {
                fileNameDisplay.textContent = "ยังไม่ได้เลือกไฟล์...";
            }
        });

        // ส่งข้อมูลฟอร์ม
        itemForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.textContent = "กำลังอัปโหลดข้อมูล... ☁️";

            const type = document.getElementById('type').value;
            const itemName = document.getElementById('itemName').value;
            const description = document.getElementById('description').value;
            const contact = document.getElementById('contact').value;
            const file = imageUpload.files[0];

            let imageUrl = "";

            try {
                if (file) {
                    const storageRef = ref(storage, 'unilost_images/' + Date.now() + '_' + file.name);
                    await uploadBytes(storageRef, file);
                    imageUrl = await getDownloadURL(storageRef);
                }

                await addDoc(collection(db, "items"), {
                    type: type,
                    itemName: itemName,
                    description: description,
                    contact: contact,
                    imageUrl: imageUrl, 
                    timestamp: serverTimestamp()
                });
                
                itemForm.reset();
                fileNameDisplay.textContent = "ยังไม่ได้เลือกไฟล์...";
                showToast("บันทึกข้อมูลเรียบร้อยแล้ว!");
            } catch (error) {
                console.error("Error: ", error);
                showToast("เกิดข้อผิดพลาด: " + error.message, true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "บันทึกข้อมูล 💖";
            }
        });

        // ดึงข้อมูลมาแสดงแบบเรียลไทม์
        const q = query(collection(db, "items"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            itemList.innerHTML = ""; 
            
            if(snapshot.empty) {
                itemList.innerHTML = "<p class='loading-text'>ยังไม่มีรายการแจ้งเข้ามาเลย ✨</p>";
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = 'item-card';
                
                const typeLabel = data.type === 'lost' ? '🚨 ของหาย' : '✅ พบของ';
                const typeClass = data.type === 'lost' ? 'lost' : 'found';
                
                let timeString = '';
                if (data.timestamp) {
                    timeString = data.timestamp.toDate().toLocaleString('th-TH');
                }

                const imageHTML = data.imageUrl ? `<img src="${data.imageUrl}" alt="ภาพสิ่งของ">` : '';

                card.innerHTML = `
                    ${imageHTML}
                    <span class="badge ${typeClass}">${typeLabel}</span>
                    <h3>${data.itemName}</h3>
                    <p><strong>รายละเอียด:</strong> ${data.description}</p>
                    <div class="contact-box">💬 ติดต่อ: ${data.contact}</div>
                    <p class="timestamp">🕒 ${timeString}</p>
                `;
                
                itemList.appendChild(card);
            });
        });
    </script>
</body>
</html>
